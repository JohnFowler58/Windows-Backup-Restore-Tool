UI_HelpText=Questo strumento è progettato per il backup, il ripristino e la riparazione dei record di boot di Windows e per la gestione dei driver.\n\nCoime funziona:\n1. Backup: seleziona una partizione e salvala come file .wim.\n2. Ripristino: seleziona un file .wim (Install.wim, ecc.) e scegli il disco/partizione  destinazione.\n3. Ripara boot: se il sistema non si avvia, usa la scansione e la riparazione automatiche.\n4. Gestione driver: esegui il backup dei driver esistenti o installa automaticamente i driver da una cartella.

